<script>
/* ========= MONACO SETUP (optional — falls back to <pre> if CDN fails) ========= */
let monacoReady = false;
const pendingEditors = [];
try {
  if (typeof require !== 'undefined') {
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
      monacoReady = true;
      pendingEditors.forEach(fn => fn());
      pendingEditors.length = 0;
    });
  } else {
    console.warn('Monaco loader unavailable — falling back to plain text code blocks');
  }
} catch(e){ console.warn('Monaco init failed', e); }

function renderFallback(id, value){
  const el = document.getElementById(id);
  if(!el || el.dataset.mounted) return;
  el.dataset.mounted = '1';
  el.style.height = 'auto';
  el.innerHTML = '<pre style="margin:0;padding:14px;background:#0a0f24;color:#cfd8ff;font-family:Consolas,monospace;font-size:13px;overflow-x:auto;white-space:pre">'+
    value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</pre>';
}

function makeEditor(id, value, opts={}){
  const mount = () => {
    const el = document.getElementById(id);
    if(!el || el.dataset.mounted) return;
    if(!monacoReady || typeof monaco === 'undefined'){
      renderFallback(id, value); return;
    }
    el.dataset.mounted = '1';
    try {
      monaco.editor.create(el, {
        value,
        language: opts.language || 'java',
        theme: 'vs-dark',
        readOnly: opts.readOnly !== false,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        fontSize: 13,
        lineNumbers: opts.lineNumbers || 'on',
        automaticLayout: true,
        wordWrap: 'on'
      });
    } catch(e){
      console.warn('Monaco failed for '+id, e);
      el.dataset.mounted = '';
      renderFallback(id, value);
    }
  };
  if(monacoReady) mount();
  else {
    pendingEditors.push(mount);
    // After 3s, give up waiting and render plain text fallback
    setTimeout(()=>{
      const el = document.getElementById(id);
      if(el && !el.dataset.mounted) renderFallback(id, value);
    }, 3000);
  }
}

/* ========= CONFETTI ========= */
function confetti(){
  const c = document.getElementById('confettiCanvas');
  const ctx = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const parts = [];
  const colors = ['#7c5cff','#3ddc97','#ffb84d','#4ec3ff','#ff79c6'];
  for(let i=0;i<120;i++){
    parts.push({x:innerWidth/2,y:innerHeight/2,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-4,c:colors[i%colors.length],s:Math.random()*6+3,r:Math.random()*Math.PI});
  }
  let t = 0;
  (function tick(){
    ctx.clearRect(0,0,c.width,c.height);
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.r+=0.1;ctx.fillStyle=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore();});
    if(t++ < 90) requestAnimationFrame(tick); else ctx.clearRect(0,0,c.width,c.height);
  })();
}

parallel: () => `
<h2 class="module-title">⚡ Parallel Execution + ThreadLocal</h2>
<p class="module-sub">Run hundreds of tests in seconds — and keep them race-condition-free.</p>
<div class="card">
<h3>Courgette runner — parallel Cucumber</h3>
<div class="monaco-container tall" id="ed-par-1"></div>
</div>
<div class="card">
<h3>Key Courgette options</h3>
<table>
<tr><th>Option</th><th>Description</th></tr>
<tr><td><code>threads</code></td><td>Parallel thread count</td></tr>
<tr><td><code>runLevel = SCENARIO</code></td><td>Each scenario in its own thread</td></tr>
<tr><td><code>runLevel = FEATURE</code></td><td>Each feature file in its own thread</td></tr>
<tr><td><code>rerunFailedScenarios</code></td><td>Auto-retry failures once</td></tr>
</table>
</div>
<div class="card">
<h3>The parallel-safety problem</h3>
<div class="monaco-container short" id="ed-par-2"></div>
<p>With shared fields, thread A's response can be overwritten by thread B before A asserts on it — flaky tests.</p>
</div>
<div class="card">
<h3>Solution — ThreadLocal</h3>
<div class="monaco-container tall" id="ed-par-3"></div>
<div class="alert alert-tip">Always <code>.remove()</code> in <code>@After</code> — otherwise thread pools reuse threads and you'll leak state across scenarios.</div>
</div>
<button class="btn btn-success" onclick="completeModule('parallel')">Mark Complete ✓</button>
<script>
makeEditor('ed-par-1',
\`@RunWith(CourgetteJUnitRunner.class)
@CourgetteOptions(
    threads = 4,
    runLevel = CourgetteRunLevel.SCENARIO,
    rerunFailedScenarios = true,
    reportTargetDir = "build/reports",
    cucumberOptions = @CucumberOptions(
        features = "src/smokeTest/resources/features",
        glue = "com.example.test.steps",
        tags = "@smoke",
        plugin = { "pretty", "io.qameta.allure.cucumber6jvm.AllureCucumber6Jvm" }
    )
)
public class TestRunner {}\`);

makeEditor('ed-par-2',
\`// BAD — shared field, race condition under parallel runs
private Response response;
private String token;\`);

makeEditor('ed-par-3',
\`// GOOD — each thread has its own copy
private static final ThreadLocal<Response> tlResponse = new ThreadLocal<>();
private static final ThreadLocal<String>   tlToken    = new ThreadLocal<>();

public void setResponse(Response r) { tlResponse.set(r); }
public Response getResponse()        { return tlResponse.get(); }

@After
public void cleanThreadLocals() {
    tlResponse.remove();   // critical — prevents leakage between scenarios
    tlToken.remove();
}\`);
<\/script>
`,

/* ========= LIVE FETCH (TIER 2) ========= */
async function liveFetch(method, urlInputId, headerInputId, bodyInputId, respId, metaId){
  const url = 'https://reqres.in' + document.getElementById(urlInputId).value;
  const headers = {'Content-Type':'application/json'};
  if(headerInputId){
    const h = document.getElementById(headerInputId).value;
    if(h && h.includes(':')){ const [k,v]=h.split(':'); headers[k.trim()] = v.trim(); }
  }
  const meta = document.getElementById(metaId);
  const resp = document.getElementById(respId);
  resp.textContent = 'Sending...';
  meta.innerHTML = '';
  const t0 = performance.now();
  try {
    const opts = { method, headers };
    if(bodyInputId && method !== 'GET'){ opts.body = document.getElementById(bodyInputId).value; }
    const r = await fetch(url, opts);
    const ms = Math.round(performance.now() - t0);
    const text = await r.text();
    let formatted = text;
    try { formatted = JSON.stringify(JSON.parse(text), null, 2); } catch(e){}
    resp.textContent = formatted || '(empty body)';
    const statusClass = r.ok ? '' : 'err';
    meta.innerHTML = `<span class="${statusClass}"><b>Status:</b> ${r.status} ${r.statusText}</span><span><b>Time:</b> ${ms}ms</span><span><b>Size:</b> ${text.length}B</span>`;
    state.xp += 20; save(); updateProgress();
  } catch(e){
    resp.textContent = 'Error: ' + e.message;
    meta.innerHTML = `<span class="err"><b>Network error</b></span>`;
  }
}

function liveFetchVerb(){
  const method = document.getElementById('anyMethod').value;

}

function setupDrag(){

function renderVerbMatch(){
